<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オーディションEAST／スタンドアップ出演者検索（非公式）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>オーディションEAST／スタンドアップ出演者検索（非公式）</h1>
    </header>

    <section class="panel">
      <h2>芸人名で検索</h2>
      <input id="nameQuery" type="text" placeholder="芸人の名前を入力">
    </section>

    <section class="panel">
      <h2>条件で絞り込む</h2>
      <div class="filters">
        <label>ライブ名
          <select id="eventType">
            <option value="all">すべて</option>
            <option value="audition-1st-east">オーディション1stステージ EAST</option>
            <option value="audition-2nd-east">オーディション2ndステージ EAST</option>
            <option value="standup">渋谷・神保町スタンドアップ</option>
          </select>
        </label>
        <label>月
          <select id="month">
            <option value="all">すべて</option>
          </select>
        </label>
        <label>日
          <select id="day">
            <option value="all">すべて</option>
          </select>
        </label>
        <label>時間
          <select id="hour">
            <option value="all">すべて</option>
          </select>
        </label>
      </div>
      <p class="note">※ 月だけ選んでも検索できます</p>
      <button id="searchBtn">検索</button>
    </section>

    <section class="panel">
      <h2>検索結果</h2>
      <div id="results"></div>
    </section>

    <section class="panel compact">
      <h2>別の条件でもう一度検索する</h2>
      <button id="scrollTopBtn">上の検索欄へ戻る</button>
      <p class="archive-link"><a href="#archive">過去の開催を見る</a></p>
    </section>

    <section class="panel" id="archive">
      <h2>過去の開催</h2>
      <div id="archiveResults"></div>
    </section>

    <footer class="footer">
      <p>出典：<a href="https://x.com/jimbo_audition" target="_blank" rel="noopener noreferrer">@jimbo_audition</a></p>
      <p>最新情報は公式アカウントをご確認ください。本サイトは非公式です。</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
