  <meta property="og:url" content="https://yukiguni00.github.io/search-audition/">
  <meta property="og:image" content="https://yukiguni00.github.io/search-audition/ogp.jpg">

  <meta name="twitter:title" content="オーディションEAST／渋谷・神保町スタンドアップ 出演者検索 (非公式)">
  <meta name="twitter:description" content="日時などで検索可能 / お気に入り機能あり">

  <link rel="stylesheet" href="style.css">

<body>
  <main class="container">
    <header class="hero">
      <h1>オーディションEAST<br>渋谷・神保町スタンドアップ<br>出演者検索（非公式）</h1>
    </header>

    <section class="panel">
      <h2>芸人名で検索</h2>
      <input id="nameQuery" type="text" placeholder="芸人の名前を入力">
    </section>

    <section class="panel">
      <h2>条件で絞り込む</h2>
      <div class="filters">
        <label class="filter-full">ライブ名
          <select id="eventType">
            <option value="all">すべて</option>
            <option value="audition-1st-east">オーディション1stステージ EAST</option>
            <option value="audition-2nd-east">オーディション2ndステージ EAST</option>
            <option value="standup">渋谷・神保町スタンドアップ</option>
          </select>
        </label>
        <div class="filters-compact">
          <label>月
            <select id="month">
              <option value="all">すべて</option>
            </select>
          </label>
          <label>日
            <select id="day">
              <option value="all">すべて</option>
            </select>
          </label>
          <label>時間
            <select id="hour">
              <option value="all">すべて</option>
            </select>
          </label>
        </div>
      </div>
      <div class="button-row">
        <button id="favoritesOnlyBtn" class="secondary-btn" type="button" aria-pressed="false">★のみ</button>
        <button id="clearBtn" class="secondary-btn" type="button">条件クリア</button>
      </div>

      <p class="note">
        ※1項目だけの選択でも検索できます<br>
        ※お気に入りの登録情報はブラウザに依存するため、ブラウザを変えてアクセスするとお気に入りが反映されません
      </p>
      
    </section>

    <section class="panel">
      <h2>検索結果</h2>
      <p class="result-note">※出演者は香盤順です。詳細は公式情報をご確認ください。</p>
      <div id="results"></div>
    </section>


    <section class="panel" id="archive">
      <h2>過去の開催</h2>
      <div id="archiveResults"></div>
    </section>

    <button id="floatingTopBtn" class="floating-top-btn" aria-label="ページ上部へ戻る">↑ トップ</button>


    <footer class="footer">
  <p>情報出典：<a href="https://x.com/jimbo_audition" target="_blank" rel="noopener noreferrer">@jimbo_audition</a></p>
      <p>
        最新情報は公式アカウントをご確認ください。<br>
        個人で管理しております。<br>
        ご意見・不具合などありましたら、下記リンクからご連絡ください。<br>
        （特に出演者情報の間違いなどお願いいたします！）
      </p>
      <p><a href="https://note.com/yukiguni00/n/n15084f98cda4" target="_blank" rel="noopener noreferrer">このサイトについて／問い合わせ</a></p>
    </footer>
    
  </main>
  <script src="script.js"></script>
</body>
</html>
