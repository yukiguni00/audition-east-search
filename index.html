<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オーディションEAST／スタンドアップ出演者検索（非公式）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>オーディションEAST<br>渋谷・神保町スタンドアップ<br>出演者検索（非公式）</h1>
    </header>

    <section class="panel">
      <h2>芸人名で検索</h2>
      <input id="nameQuery" type="text" placeholder="芸人の名前を入力">
    </section>

    <section class="panel">
      <h2>条件で絞り込む</h2>
      <div class="filters">
        <label class="filter-full">ライブ名
          <select id="eventType">
            <option value="all">すべて</option>
            <option value="audition-1st-east">オーディション1stステージ EAST</option>
            <option value="audition-2nd-east">オーディション2ndステージ EAST</option>
            <option value="standup">渋谷・神保町スタンドアップ</option>
          </select>
        </label>
        <div class="filters-compact">
          <label>月
            <select id="month">
              <option value="all">すべて</option>
            </select>
          </label>
          <label>日
            <select id="day">
              <option value="all">すべて</option>
            </select>
          </label>
          <label>時間
            <select id="hour">
              <option value="all">すべて</option>
            </select>
          </label>
        </div>
      </div>
      <p class="note">※1項目だけの選択でも検索できます</p>
      <div class="button-row">
        <button id="clearBtn" class="secondary-btn" type="button">条件クリア</button>
      </div>
    </section>

    <section class="panel">
      <h2>検索結果</h2>
      <div id="results"></div>
    </section>


    <section class="panel" id="archive">
      <h2>過去の開催</h2>
      <div id="archiveResults"></div>
    </section>

    <button id="floatingTopBtn" class="floating-top-btn" aria-label="ページ上部へ戻る">↑ トップ</button>


    <footer class="footer">
  <p>情報出典：<a href="https://x.com/jimbo_audition" target="_blank" rel="noopener noreferrer">@jimbo_audition</a></p>
      <p>
        最新情報は公式アカウントをご確認ください。<br>
        個人で管理しているため、情報に誤りがありましたら<br>
        下記アカウントまでご連絡ください。
      </p>
      <p>Contact : <a href="https://x.com/yukiguni00" target="_blank" rel="noopener noreferrer">@yukiguni00</a></p>
    </footer>
    
  </main>
  <script src="script.js"></script>
</body>
</html>
